<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐搜索 - QQ音乐</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="search-style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <i class="fas fa-music"></i>
                <span>QQ音乐</span>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html"><i class="fas fa-home"></i> 首页</a></li>
                <li><a href="rank.html"><i class="fas fa-trophy"></i> 排行榜</a></li>
                <li><a href="profile.html"><i class="fas fa-user"></i> 我的音乐</a></li>
                <li class="nav-item search-active">
                    <a href="search.html"><i class="fas fa-search"></i> 搜索</a>
                </li>
            </ul>
            <div class="nav-user">
                <a href="login.html" class="login-btn">
                    <i class="fas fa-user-circle"></i> 登录
                </a>
            </div>
        </div>
    </nav>

    <!-- 主要内容 -->
    <main class="search-container">
        <!-- 搜索头部 -->
        <header class="search-header">
            <div class="search-title">
                <h1><i class="fas fa-search"></i> 音乐搜索</h1>
                <p>发现你喜欢的音乐</p>
            </div>
        </header>

        <!-- 搜索框 -->
        <section class="search-section">
            <div class="search-box">
                <div class="search-input-container">
                    <input type="text" id="searchInput" placeholder="搜索歌曲、歌手或专辑..." class="search-input">
                    <button class="search-btn" id="searchBtn">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
                <div class="search-suggestions">
                    <div class="suggestion-title">热门搜索：</div>
                    <div class="suggestion-tags">
                        <span class="suggestion-tag" data-keyword="周杰伦">周杰伦</span>
                        <span class="suggestion-tag" data-keyword="晴天">晴天</span>
                        <span class="suggestion-tag" data-keyword="青花瓷">青花瓷</span>
                        <span class="suggestion-tag" data-keyword="稻香">稻香</span>
                        <span class="suggestion-tag" data-keyword="成都">成都</span>
                        <span class="suggestion-tag" data-keyword="星辰大海">星辰大海</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 搜索结果 -->
        <section class="results-section">
            <div class="results-header" id="resultsHeader" style="display: none;">
                <div class="results-info">
                    <h2 id="resultsTitle">搜索结果</h2>
                    <div class="results-count" id="resultsCount"></div>
                </div>
                <div class="results-filter">
                    <button class="filter-btn active" data-filter="all">全部</button>
                    <button class="filter-btn" data-filter="song">单曲</button>
                    <button class="filter-btn" data-filter="singer">歌手</button>
                    <button class="filter-btn" data-filter="album">专辑</button>
                </div>
            </div>

            <!-- 音乐结果列表 -->
            <div class="results-content" id="resultsContent">
                <div class="welcome-message">
                    <div class="welcome-icon">
                        <i class="fas fa-music"></i>
                    </div>
                    <h2>开始搜索你喜欢的音乐</h2>
                    <p>输入歌曲名、歌手名或专辑名，开始你的音乐之旅</p>
                    <div class="search-categories">
                        <div class="category-card">
                            <div class="category-icon">
                                <i class="fas fa-fire"></i>
                            </div>
                            <h3>热门歌曲</h3>
                            <p>发现最流行的音乐</p>
                        </div>
                        <div class="category-card">
                            <div class="category-icon">
                                <i class="fas fa-star"></i>
                            </div>
                            <h3>新歌推荐</h3>
                            <p>最新发布的歌曲</p>
                        </div>
                        <div class="category-card">
                            <div class="category-icon">
                                <i class="fas fa-heart"></i>
                            </div>
                            <h3>经典老歌</h3>
                            <p>永不褪色的经典</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <!-- 搜索历史 -->
        <section class="search-history" id="searchHistorySection" style="display: none;">
            <div class="history-header">
                <h3><i class="fas fa-history"></i> 搜索历史</h3>
                <button class="clear-history-btn" onclick="clearSearchHistory()">
                    <i class="fas fa-trash"></i> 清空
                </button>
            </div>
            <div class="history-list" id="searchHistoryList">
                <!-- 动态生成搜索历史 -->
            </div>
        </section>
    </main>

    <!-- 登录功能已移至单独的login.html页面 -->

    <!-- 播放器 -->
    <footer class="music-player">
        <div class="player-container">
            <div class="player-info">
                <img class="current-cover" src="image/不能说的秘密.jpg" alt="当前封面" id="currentCover" onerror="this.src='image/周杰伦.jpg'; this.onerror=null;">
                <div class="current-song">
                    <h4 id="currentTitle">未选择音乐</h4>
                    <p id="currentArtist">未知歌手</p>
                </div>
            </div>
            
            <div class="player-controls">
                <button class="control-btn" onclick="togglePlay()">
                    <i class="fas fa-play" id="playIcon"></i>
                </button>
                <button class="control-btn" onclick="previousTrack()">
                    <i class="fas fa-step-backward"></i>
                </button>
                <button class="control-btn" onclick="nextTrack()">
                    <i class="fas fa-step-forward"></i>
                </button>
            </div>
            
            <div class="player-progress">
                <span id="currentTime">00:00</span>
                <div class="progress-bar">
                    <div class="progress" id="progressBar"></div>
                </div>
                <span id="totalTime">00:00</span>
            </div>
            
            <div class="player-volume">
                <button class="volume-btn" onclick="toggleMute()">
                    <i class="fas fa-volume-up" id="volumeIcon"></i>
                </button>
                <input type="range" class="volume-slider" min="0" max="100" value="50" onchange="setVolume(this.value)">
            </div>
        </div>
        <audio id="audioPlayer" preload="metadata"></audio>
    </footer>

    <script src="script.js"></script>
    <script src="search-script.js"></script>
</body>
</html>
